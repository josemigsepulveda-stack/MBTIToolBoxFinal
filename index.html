// ============ RENDER ============
let currentLang = "en";
let currentTab = "stress";

function renderStress() {
  const L = i18n[currentLang];
  const colors = { best:"#E8F5E9", l1:"#FFF3E0", l2:"#FFEBEE", restore:"#E3F2FD" };
  const labels = { best:L.best, l1:L.l1, l2:L.l2, restore:L.restore };
  let html = "";
  stress.forEach((p,idx) => {
    const d = p[currentLang];
    html += `<div class="card" style="border:2px solid ${p.color}">
      <div class="card-header" style="background:${p.color}" onclick="toggleCard(this)">
        <div class="left"><span class="emoji">${p.emoji}</span><span class="name">${d.name}</span><span class="types">${d.types}</span></div>
        <span class="arrow">▼</span>
      </div>
      <div class="card-body">
        <div class="card-motto">${d.fn} — ${d.motto}</div>`;
    ["best","l1","l2","restore"].forEach(k => {
      html += `<div class="section-block"><div class="section-label" style="background:${colors[k]}">${labels[k]}</div><ul>`;
      d[k].forEach(item => { html += `<li>${item}</li>`; });
      html += `</ul></div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("stress-cards").innerHTML = html;
}

function renderComm() {
  const L = i18n[currentLang];
  const l = currentLang === "ua" ? "en" : currentLang;
  // Matrix
  const matrixData = [
    {pair:"NF",color:"#F9A825",label:{en:"Idealists",fr:"Idéalistes"}},
    {pair:"SF",color:"#7CB342",label:{en:"Carers",fr:"Prévenants"}},
    {pair:"NT",color:"#B71C1C",label:{en:"Visionaries",fr:"Visionnaires"}},
    {pair:"ST",color:"#1565C0",label:{en:"Analyticals",fr:"Analytiques"}}
  ];
  let mhtml = `<div class="matrix">`;
  matrixData.forEach(m => {
    mhtml += `<div class="matrix-cell" style="background:${m.color}"><div class="pair">${m.pair}</div><div class="label">${m.label[l]}</div></div>`;
  });
  mhtml += `</div><div class="axis-info">↕ ${L.axisV} &nbsp;|&nbsp; ↔ ${L.axisH}</div>`;
  document.getElementById("comm-matrix").innerHTML = mhtml;

  // Cards
  let html = "";
  comm.forEach(s => {
    const nm = s.name[l];
    html += `<div class="card" style="border:3px solid ${s.color}">
      <div class="card-header" style="background:${s.color}" onclick="toggleCard(this)">
        <div class="left"><span class="name" style="font-size:22px;margin-right:10px">${s.pair}</span><span class="types">${nm}</span></div>
        <span class="arrow">▼</span>
      </div>
      <div class="card-body">
        <div style="margin-bottom:12px"><div style="font-weight:700;font-size:14px;color:${s.color};margin-bottom:6px">${L.chars}</div><div class="tags">`;
    s.chars[l].forEach(c => { html += `<span class="tag" style="background:${s.color}18;color:${s.color}">${c}</span>`; });
    html += `</div></div>
        <div style="margin-bottom:12px"><div style="font-weight:700;font-size:14px;color:${s.color};margin-bottom:6px">${L.convince}</div><ul>`;
    s.convince[l].forEach(t => { html += `<li style="font-size:13px;line-height:1.6">${t}</li>`; });
    html += `</ul></div>
        <div class="do-dont">
          <div class="do-box"><h4 style="color:#2E7D32">✅ ${L.doL}</h4><ul>`;
    s.doL[l].forEach(d => { html += `<li>${d}</li>`; });
    html += `</ul></div><div class="dont-box"><h4 style="color:#C62828">❌ ${L.dontL}</h4><ul>`;
    s.dontL[l].forEach(d => { html += `<li>${d}</li>`; });
    html += `</ul></div></div></div></div>`;
  });
  document.getElementById("comm-cards").innerHTML = html;
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector(".arrow");
  body.classList.toggle("open");
  arrow.classList.toggle("open");
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  renderStress();
  renderComm();
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("stress-section").style.display = tab === "stress" ? "block" : "none";
  document.getElementById("comm-section").style.display = tab === "comm" ? "block" : "none";
}

// Event listeners
document.querySelectorAll(".lang-btn").forEach(b => b.addEventListener("click", () => setLang(b.dataset.lang)));
document.querySelectorAll(".tab-btn").forEach(b => b.addEventListener("click", () => setTab(b.dataset.tab)));

// Initial render
renderStress();
renderComm();
</script>
