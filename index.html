*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Calibri,-apple-system,sans-serif;background:linear-gradient(135deg,#f5f7fa,#e4e9f0);min-height:100vh;color:#333}
.header{background:linear-gradient(135deg,#005B96,#009B8D);color:#fff;padding:20px 16px 14px;text-align:center}
.header .sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.8}
.header h1{font-size:26px;font-weight:800}
.header p{font-size:13px;opacity:.85;margin-top:4px}
.lb{display:flex;justify-content:center;gap:5px;padding:10px 12px;background:#fff;border-bottom:1px solid #e0e0e0;flex-wrap:wrap}
.lb button{padding:4px 10px;border-radius:20px;border:1px solid #ccc;background:#fff;color:#333;font-size:10.5px;font-weight:600;cursor:pointer}
.lb button.active{border:2px solid #005B96;background:#005B96;color:#fff}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;overflow-x:auto}
.tab-btn{flex:0 0 auto;padding:11px 9px;border:none;border-bottom:3px solid transparent;background:#fff;color:#666;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.tab-btn.active{border-bottom-color:#E8772E;background:#FFF8F0;color:#E8772E}
.content{padding:14px;max-width:740px;margin:0 auto}
.section-title{text-align:center;margin-bottom:14px}
.section-title h2{font-size:18px;color:#333}
.section-title p{font-size:12px;color:#888}
.card{border-radius:11px;margin-bottom:12px;overflow:hidden;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-header{color:#fff;padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.card-header .left{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.card-header .name{font-size:15px;font-weight:700}
.card-header .types{font-size:10.5px;opacity:.85}
.card-header .arrow{font-size:16px;transition:transform .2s}
.card-header .arrow.open{transform:rotate(180deg)}
.card-body{padding:13px 14px;display:none}
.card-body.open{display:block}
.section-block{margin-bottom:9px}
.section-label{padding:6px 10px;border-radius:5px;font-weight:700;font-size:12.5px;color:#333;margin-bottom:4px}
.section-block ul{padding-left:18px;margin:0}
.section-block li{font-size:12px;line-height:1.5;margin-bottom:1px}
.card-motto{font-style:italic;color:#555;margin-bottom:10px;font-size:12.5px;line-height:1.5}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;margin:2px 3px 2px 0;cursor:pointer}
.do-dont{display:flex;gap:7px;flex-wrap:wrap}
.do-dont>div{flex:1 1 130px;border-radius:7px;padding:8px}
.do-dont h4{font-size:11px;margin-bottom:3px}
.do-dont ul{padding-left:14px;margin:0}
.do-dont li{font-size:11px;margin-bottom:1px;line-height:1.3}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}
.grid2 .cell{border-radius:9px;padding:11px 6px;text-align:center;color:#fff;cursor:pointer}
.grid2 .cell h3{font-size:15px}
.grid2 .cell p{font-size:10px;opacity:.9}
.quote{border-left:4px solid #009B8D;padding:6px 12px;margin:8px 0;background:#E6F7F5;border-radius:0 6px 6px 0;font-size:12px;font-style:italic}
.motto{text-align:center;font-size:13px;font-weight:700;color:#555;margin:8px 0 4px;font-style:italic}
.zz-model{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:12px 0;border:2px solid #ddd;border-radius:11px;overflow:hidden}
.zz-cell{padding:10px}
.zz-cell h4{font-size:12.5px;margin-bottom:3px}
.zz-cell ul{padding-left:14px;margin:0}
.zz-cell li{font-size:10px;line-height:1.35}
.zigzag-bar{display:flex;border-radius:7px;overflow:hidden;margin:7px 0}
.zigzag-bar div{padding:8px 3px;text-align:center;color:#fff;font-weight:700;font-size:12px;display:flex;flex-direction:column;align-items:center}
.zigzag-bar div span{font-size:9px;font-weight:400;opacity:.85}
.tk-detail{background:#fff;border-radius:9px;padding:13px;margin:9px 0;box-shadow:0 2px 10px rgba(0,0,0,.12);border-left:5px solid #ccc}
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-width:320px;margin:8px auto}
.matrix div{color:#fff;padding:10px 5px;border-radius:7px;text-align:center}
.matrix .pair{font-size:18px;font-weight:800}
.mx .lb2{font-size:9px;opacity:.9}
.axis-info{font-size:10px;color:#999;text-align:center;margin-bottom:8px}
[dir=rtl]{direction:rtl;text-align:right}
[dir=rtl] .card-header{flex-direction:row-reverse}
[dir=rtl] .section-block ul,[dir=rtl] .do-dont ul{padding-left:0;padding-right:18px}
.footer{text-align:center;padding:18px 14px;font-size:10px;color:#aaa;border-top:1px solid #e0e0e0;margin-top:18px}
</style></head><body>

function renderStress(){
  var LL=i18n[currentLang]||i18n.en;
  var colors={best:"#E8F5E9",l1:"#FFF3E0",l2:"#FFEBEE",restore:"#E3F2FD"};
  var labels={best:LL.best,l1:LL.l1,l2:LL.l2,restore:LL.restore};
  var h='<div class="section-title"><h2>'+L('stT')+'</h2><p>'+L('stS')+'</p></div>';
  stress.forEach(function(p){
    var d=p[currentLang]||p.en;
    h+='<div class="card" style="border:2px solid '+p.color+'"><div class="card-header" style="background:'+p.color+'" onclick="toggleCard(this)"><div class="left"><span style="font-size:22px">'+p.emoji+'</span><span class="name">'+d.name+'</span><span class="types">'+d.types+'</span></div><span class="arrow">\u25BC</span></div><div class="card-body">';
    h+='<div class="card-motto">'+d.fn+' \u2014 '+d.motto+'</div>';
    ["best","l1","l2","restore"].forEach(function(k){
      h+='<div class="section-block"><div class="section-label" style="background:'+colors[k]+'">'+labels[k]+'</div><ul>';
      d[k].forEach(function(item){h+='<li>'+item+'</li>'});
      h+='</ul></div>';
    });
    h+='</div></div>';
  });
  return h;
}
function renderComm(){

}

function renderZigzag(){
  var h='<div class="section-title"><h2>'+L('zzT')+'</h2><p>'+L('zzS')+'</p></div>';

  var q=function(fn){return (zzQ[fn][currentLang]||zzQ[fn].en)};

  h+='<div class="zz-model">';

  h+='<div class="zz-model">';
  h+='<div class="zz-cell" style="background:#E3F2FD;border-right:1px solid #ddd"><h4 style="color:#1565C0">\u2462 T \u2014 '+L('s3')+'</h4><ul>';

function showZZ(type,btn){
  var stack=stacks[type];if(!stack)return;
  var roles=zzRoles[currentLang]||zzRoles.en;
  var acts=function(fn){return zzAct[fn][currentLang]||zzAct[fn].en};
  // Highlight button
  if(btn){var bs=btn.parentNode.querySelectorAll('button');bs.forEach(function(b){b.style.background='#fff';b.style.color='#333';b.style.border='1px solid #ccc'});btn.style.background=fnColors[stack[0]];btn.style.color='#fff';btn.style.border='2px solid '+fnColors[stack[0]]}
  var widths=["38%","26%","22%","16%"];
  var h='<div class="card" style="border:2px solid #005B96;margin-top:12px"><div style="background:linear-gradient(135deg,'+fnColors[stack[0]]+','+fnColors[stack[1]]+');color:#fff;padding:12px 16px;text-align:center"><span style="font-size:24px;font-weight:800">'+type+'</span><br><span style="font-size:11px;opacity:.9">'+L('zzOrd')+'</span></div><div style="padding:14px">';
  h+='<div class="zigzag-bar">';
  stack.forEach(function(fn,i){h+='<div style="background:'+fnColors[fn]+';width:'+widths[i]+'">'+fn+'<span>'+zzDur[i]+'</span></div>'});
  h+='</div>';
  stack.forEach(function(fn,i){
    h+='<div class="section-block" style="margin-top:6px"><div class="section-label" style="background:'+fnColors[fn]+'18;border-left:4px solid '+fnColors[fn]+'"><strong>'+fnNames[fn]+'</strong> \u2014 '+zzDur[i]+' \u2014 <em>'+roles[i]+'</em></div><ul>';
    acts(fn).forEach(function(a){h+='<li style="font-size:11.5px">'+a+'</li>'});
    h+='</ul></div>';
  });
  h+='<div class="section-block" style="margin-top:10px"><div class="section-label" style="background:#E8F5E9">\u{1F4AA} '+L('zzStr')+'</div><ul>';
  h+='<li>'+fnNames[stack[0]]+' = main driver</li><li>'+fnNames[stack[1]]+' = balancing</li><li>First 2 steps are natural and effortless</li></ul></div>';
  h+='<div class="section-block"><div class="section-label" style="background:#FFEBEE">\u26A0\uFE0F '+L('zzWat')+'</div><ul>';
  h+='<li>Risk of over-investing '+fnNames[stack[0]]+'</li><li>'+fnNames[stack[3]]+' = blind spot</li><li>Under pressure, may skip steps 3-4</li></ul></div>';
  h+='</div></div>';
  document.getElementById('zz-detail').innerHTML=h;
  document.getElementById('zz-detail').scrollIntoView({behavior:'smooth'});
}
function renderConflict(){
  var h='<div class="section-title"><h2>'+L('cfT')+'</h2><p>'+L('cfS')+'</p></div>';
  h+='<p style="font-weight:700;font-size:13px;text-align:center">'+L('cfCl')+'</p>';

    h+='</ul></div>';
    h+='<div class="section-block"><div class="section-label" style="background:#E3F2FD">\u{1F4A1} '+L('cfTip')+'</div><ul>';
    d.tips.forEach(function(t){h+='<li>'+t+'</li>'});

}
function showTK(id){
  var s=null;tkStyles.forEach(function(st){if(st.id===id)s=st});if(!s)return;
  var d=s[currentLang]||s.en;
  var h='<div class="tk-detail" style="border-left-color:'+s.color+'"><h4 style="color:'+s.color+'">'+s.icon+' '+d.style+'</h4>';
  h+='<p><strong>'+L('cfDef')+':</strong> '+d.def+'</p>';
  h+='<div class="section-block"><div class="section-label" style="background:#E8F5E9">\u2705 '+L('cfEff')+'</div><ul>';
  d.effective.forEach(function(e){h+='<li>'+e+'</li>'});
  h+='</ul></div>';
  h+='<div class="section-block"><div class="section-label" style="background:#FFEBEE">\u274C '+L('cfLim')+'</div><ul>';
  d.limits.forEach(function(l){h+='<li>'+l+'</li>'});
  h+='</ul></div></div>';
  document.getElementById('tk-detail').innerHTML=h;
}

// ====== NAVIGATION ======
var allTabs=[
  {id:"stress",icon:"\u{1F9E0}",key:"ts"},
  {id:"comm",icon:"\u{1F4AC}",key:"tc"},
  {id:"collab",icon:"\u{1F91D}",key:"tco"},
  {id:"change",icon:"\u{1F504}",key:"tch"},
  {id:"lead",icon:"\u{1F451}",key:"tl"},
  {id:"zigzag",icon:"\u26A1",key:"tz"},
  {id:"conflict",icon:"\u{1F525}",key:"tf"}
];
function renderLangBar(){
  var h='';
  Object.keys(LANGS).forEach(function(k){
    h+='<button class="lang-btn '+(currentLang===k?'active':'')+'" onclick="setLang(\''+k+'\')">'+LANGS[k]+'</button>';
  });
  document.getElementById('lang-bar').innerHTML=h;
}
function renderTabs(){
  var h='';
  allTabs.forEach(function(t){
    h+='<button class="tab-btn '+(currentTab===t.id?'active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.icon+' '+L(t.key)+'</button>';
  });
  document.getElementById('tabs').innerHTML=h;
}
function setLang(lang){
  currentLang=lang;
  if(lang==='ar'){document.body.setAttribute('dir','rtl')}else{document.body.removeAttribute('dir')}
  renderLangBar();
  renderTabs();
  setTab(currentTab);
}
function setTab(id){
  currentTab=id;
  renderTabs();
  var c='';
  if(id==='stress')c=renderStress();
  else if(id==='comm')c=renderComm();
  else if(id==='collab')c=renderCollab();
  else if(id==='change')c=renderChange();
  else if(id==='lead')c=renderLead();
  else if(id==='zigzag')c=renderZigzag();
  else if(id==='conflict')c=renderConflict();
  document.getElementById('main').innerHTML=c;
  window.scrollTo(0,0);
}
renderLangBar();
renderTabs();
setTab('stress');

</script>
